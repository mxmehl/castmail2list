[settings]
use_versions_host_track = false

[tools]
python = "3.14"
uv = "latest"

[vars]
app_dir = "castmail2list"

[tasks."lint:ty"]
description = "Run ty type checks"
run = "uv run ty check"

[tasks."lint:ruff-lint"]
description = "Run ruff linter"
run = ["uv run ruff check ."]

[tasks."lint:ruff-format"]
description = "Run ruff formatter"
run = ["uv run ruff format --check ."]

[tasks."lint:reuse"]
description = "Run reuse license compliance check"
run = "uv run reuse lint"

[tasks.pytest]
description = "Run pytest"
run = "uv run pytest --cov={{ vars.app_dir }}"

[tasks."fix:ruff-format"]
description = "Fix ruff formatting issues"
run = ["uv run ruff format ."]

[tasks."fix:ruff-lint"]
description = "Fix ruff linting issues"
run = ["uv run ruff check --fix"]

[tasks.test-all]
description = "Run all tests and checks"
depends = ["lint:*", "pytest"]
run = "echo 'SUCCESS: All checks passed!'"

[tasks.fix-all]
description = "Run all fixes"
depends = ["fix:ruff-format", "fix:ruff-lint"]

[tasks.translations-update]
description = "Update translation template and .po files"
run = "uv run pybabel extract -F {{ vars.app_dir }}/babel.cfg -o {{ vars.app_dir }}/messages.pot {{ vars.app_dir }}"

[tasks.translations-compile]
description = "Compile .po files to .mo files"
run = "uv run pybabel compile -d {{ vars.app_dir }}/translations"
